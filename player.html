<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIDVIP - Player</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: #000000;
            color: #ffffff;
            min-height: 100vh;
        }

        header {
            padding: 20px 40px;
            border-bottom: 1px solid #222;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(10px);
            z-index: 100;
        }

        .logo {
            font-size: 24px;
            font-weight: 900;
            letter-spacing: 5px;
            color: #fff;
            text-decoration: none;
        }

        .logo span {
            color: #fff;
            border: 2px solid #fff;
            padding: 2px 8px;
            margin-left: 6px;
            font-size: 12px;
            vertical-align: middle;
            font-weight: 700;
            letter-spacing: 1px;
        }

        .back-link {
            color: #666;
            text-decoration: none;
            font-size: 12px;
            letter-spacing: 2px;
            transition: color 0.3s;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 500;
        }

        .back-link:hover {
            color: #fff;
        }

        main {
            max-width: 1200px;
            margin: 0 auto;
            padding: 32px 40px 60px;
        }

        .video-title {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 24px;
            line-height: 1.3;
            letter-spacing: -0.3px;
        }

        .player-container {
            position: relative;
            width: 100%;
            background: #0a0a0a;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid #222;
        }

        .player-wrapper {
            position: relative;
            width: 100%;
            padding-bottom: 56.25%;
            background: #000;
        }

        .player-wrapper iframe,
        .player-wrapper .click-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        .click-overlay {
            background: rgba(0, 0, 0, 0.4);
            cursor: pointer;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.5s ease;
        }

        .click-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .play-button {
            width: 72px;
            height: 72px;
            background: rgba(255,255,255,0.15);
            border: 2px solid rgba(255,255,255,0.9);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s;
            backdrop-filter: blur(8px);
        }

        .play-button:hover {
            background: rgba(255,255,255,0.25);
            transform: scale(1.08);
        }

        .play-button::after {
            content: '';
            width: 0;
            height: 0;
            border-left: 24px solid #fff;
            border-top: 14px solid transparent;
            border-bottom: 14px solid transparent;
            margin-left: 5px;
        }

        .overlay-text {
            margin-top: 16px;
            font-size: 11px;
            color: rgba(255,255,255,0.7);
            letter-spacing: 3px;
            text-transform: uppercase;
            font-weight: 500;
        }

        .related-section {
            margin-top: 60px;
            padding-top: 40px;
            border-top: 1px solid #1a1a1a;
        }

        .section-title {
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: #666;
            margin-bottom: 24px;
            font-weight: 500;
        }

        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 20px;
        }

        .video-card {
            cursor: pointer;
            transition: transform 0.3s ease;
            text-decoration: none;
            color: #fff;
            display: block;
        }

        .video-card:hover {
            transform: translateY(-4px);
        }

        .poster-wrapper {
            position: relative;
            width: 100%;
            aspect-ratio: 16 / 9;
            background: #111;
            border-radius: 6px;
            overflow: hidden;
            border: 1px solid #222;
        }

        .poster-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: opacity 0.3s;
        }

        .video-card:hover .poster-wrapper img {
            opacity: 0.8;
        }

        .poster-wrapper::after {
            content: '▶';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 28px;
            opacity: 0;
            transition: opacity 0.3s;
            color: #fff;
            text-shadow: 0 2px 12px rgba(0,0,0,0.9);
            pointer-events: none;
        }

        .video-card:hover .poster-wrapper::after {
            opacity: 1;
        }

        .video-card-title {
            margin-top: 12px;
            font-size: 13px;
            font-weight: 500;
            line-height: 1.4;
            color: #aaa;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            padding: 0 2px;
        }

        .video-card:hover .video-card-title {
            color: #fff;
        }

        .not-found {
            text-align: center;
            padding: 120px 20px;
        }

        .not-found h2 {
            font-size: 18px;
            color: #666;
            margin-bottom: 20px;
            font-weight: 400;
            letter-spacing: 1px;
        }

        .not-found a {
            color: #fff;
            text-decoration: none;
            font-size: 14px;
            border-bottom: 1px solid #444;
            padding-bottom: 2px;
            transition: border-color 0.3s;
        }

        .not-found a:hover {
            border-color: #fff;
        }

        .loading {
            text-align: center;
            padding: 100px 20px;
            color: #444;
            font-size: 14px;
            letter-spacing: 2px;
        }

        @media (max-width: 768px) {
            header {
                padding: 16px 24px;
            }
            
            main {
                padding: 24px;
            }
            
            .video-title {
                font-size: 18px;
                margin-bottom: 16px;
            }
            
            .video-grid {
                grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
                gap: 14px;
            }
            
            .play-button {
                width: 56px;
                height: 56px;
            }
            
            .play-button::after {
                border-left-width: 18px;
                border-top-width: 10px;
                border-bottom-width: 10px;
            }
            
            .related-section {
                margin-top: 40px;
            }
        }

        @media (max-width: 480px) {
            .video-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 12px;
            }
        }
    </style>
</head>
<body>
    <header>
        <a href="index.html" class="logo">VIDVIP <span>VIP</span></a>
        <a href="index.html" class="back-link">← Kembali</a>
    </header>

    <main id="mainContent" style="display: none;">
        <div id="videoPlayerSection">
            <h1 class="video-title" id="videoTitle">Loading...</h1>
            
            <div class="player-container">
                <div class="player-wrapper" id="playerWrapper">
                    <iframe id="videoFrame" allowfullscreen></iframe>
                    <div class="click-overlay" id="clickOverlay">
                        <div class="play-button"></div>
                        <div class="overlay-text">Klik untuk Memutar</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="related-section">
            <h3 class="section-title">Video Lainnya</h3>
            <div class="video-grid" id="relatedGrid"></div>
        </div>
    </main>

    <div class="loading" id="loading">Memuat video...</div>

    <div class="not-found" id="notFound" style="display: none;">
        <h2>Video tidak ditemukan</h2>
        <a href="index.html">Kembali ke Beranda</a>
    </div>

    <script>
        const API_URL = window.location.hostname === 'localhost' 
            ? 'http://localhost:3000/api/videos.js' 
            : '/api/videos.js';
            
        const urlParams = new URLSearchParams(window.location.search);
        const videoId = parseInt(urlParams.get('id'));

        async function loadVideo() {
            const mainContent = document.getElementById('mainContent');
            const loading = document.getElementById('loading');
            const notFound = document.getElementById('notFound');

            try {
                const response = await fetch(API_URL);
                const result = await response.json();
                
                if (!result.success) {
                    throw new Error('Gagal memuat data');
                }

                const videos = result.data;

                if (isNaN(videoId) || videoId < 0 || videoId >= videos.length) {
                    loading.style.display = 'none';
                    notFound.style.display = 'block';
                    return;
                }

                const currentVideo = videos[videoId];
                
                document.getElementById('videoTitle').textContent = currentVideo.title;
                
                let embedUrl = currentVideo.jumpshare;
                
                if (embedUrl.includes('jumpshare.com')) {
                    const jumpshareMatch = embedUrl.match(/jumpshare\.com\/(?:v|embed)\/([a-zA-Z0-9_-]+)/);
                    if (jumpshareMatch) {
                        embedUrl = `https://jumpshare.com/embed/${jumpshareMatch[1]}`;
                    } else if (embedUrl.includes('/v/')) {
                        embedUrl = embedUrl.replace('/v/', '/embed/');
                    }
                }
                
                document.getElementById('videoFrame').src = embedUrl;

                const clickOverlay = document.getElementById('clickOverlay');
                const shopeeLink = 'https://s.shopee.co.id/8ASrJE0SWI';
                const hasClicked = sessionStorage.getItem(`vidvip_clicked_${videoId}`);
                
                if (hasClicked) {
                    clickOverlay.classList.add('hidden');
                }

                clickOverlay.addEventListener('click', function() {
                    const newTab = window.open(shopeeLink, '_blank');
                    clickOverlay.classList.add('hidden');
                    sessionStorage.setItem(`vidvip_clicked_${videoId}`, 'true');
                    
                    if (newTab) {
                        setTimeout(() => {
                            window.focus();
                        }, 100);
                    }
                });

                const relatedGrid = document.getElementById('relatedGrid');
                const relatedVideos = videos.filter((_, index) => index !== videoId);
                
                if (relatedVideos.length === 0) {
                    document.querySelector('.related-section').style.display = 'none';
                } else {
                    relatedVideos.forEach((video, originalIndex) => {
                        const actualIndex = videos.findIndex(v => v === video);
                        
                        const card = document.createElement('a');
                        card.className = 'video-card';
                        card.href = `player.html?id=${actualIndex}`;
                        
                        card.innerHTML = `
                            <div class="poster-wrapper">
                                <img src="${video.poster}" alt="${video.title}" loading="lazy" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22320%22 height=%22180%22%3E%3Crect width=%22100%25%22 height=%22100%25%22 fill=%22%23111%22/%3E%3Ctext x=%2250%25%22 y=%2250%25%22 dominant-baseline=%22middle%22 text-anchor=%22middle%22 fill=%22%23444%22 font-size=%2214%22%3ENo Image%3C/text%3E%3C/svg%3E'">
                            </div>
                            <div class="video-card-title">${video.title}</div>
                        `;
                        
                        relatedGrid.appendChild(card);
                    });
                }

                loading.style.display = 'none';
                mainContent.style.display = 'block';

            } catch (error) {
                loading.style.display = 'none';
                notFound.style.display = 'block';
                notFound.innerHTML = `
                    <h2>Gagal memuat video</h2>
                    <a href="index.html">Kembali ke Beranda</a>
                `;
                console.error('Error:', error);
            }
        }

        loadVideo();
    </script>
</body>
</html>
